  <script>
    (function () {
      var APP_VERSION = 'audit-real-20260517';
      try {
        if (location.protocol === 'file:') return;
        var params = new URLSearchParams(location.search);
        var alreadyFresh = params.get('fresh') === APP_VERSION;
        var storedVersion = localStorage.getItem('sipilah_app_version');
        if (storedVersion === APP_VERSION || alreadyFresh) return;

        localStorage.setItem('sipilah_app_version', APP_VERSION);
        var clearWorkers = 'serviceWorker' in navigator
          ? navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (reg) { return reg.unregister(); }));
            })
          : Promise.resolve();
        var clearCaches = 'caches' in window
          ? caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (key) { return caches.delete(key); }));
            })
          : Promise.resolve();

        Promise.all([clearWorkers, clearCaches]).finally(function () {
          location.replace(location.pathname + '?fresh=' + APP_VERSION);
        });
      } catch (error) {}
    })();
  </script>

  <!-- PWA registration -->
  <script>
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js?v=audit-real-20260517').then(
          (reg) => console.log('[SW] Terdaftar:', reg.scope),
          (err) => console.warn('[SW] Gagal daftar:', err)
        );
      });
    }
    let deferredInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredInstallPrompt = e;
      window.__sipilahInstallReady = true;
      window.dispatchEvent(new CustomEvent('sipilah-install-ready'));
    });
    window.__sipilahInstall = async () => {
      if (!deferredInstallPrompt) return false;
      deferredInstallPrompt.prompt();
      const choice = await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      window.__sipilahInstallReady = false;
      return choice?.outcome === 'accepted';
    };
  </script>
